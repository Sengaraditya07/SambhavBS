<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Login – Mein Tera Parivaar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Doppio One', sans-serif;
        }

        input {
            width: 100%;
            background-color: #f3f4f6;
            padding: 14px 18px;
            border-radius: 9999px;
            outline: none;
        }

        label {
            font-size: 0.875rem;
            color: #4b5563;
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>

<body class="min-h-screen bg-[#E9FFF3]">

    <!-- ================= PAGE WRAPPER ================= -->
    <section class="min-h-screen grid grid-cols-1 md:grid-cols-5">

        <!-- LEFT SPACE -->
        <div class="hidden md:block md:col-span-2"></div>

        <!-- RIGHT IMAGE -->
        <div class="hidden md:block md:col-span-3 relative">
            <div class="absolute inset-0 bg-gradient-to-br from-[#1F3D2B] to-[#2F5A44]"
                style="background-image: url('/media/dashboard-img.png'); background-size: cover; background-position: right;">
            </div>
        </div>

        <!-- ================= LOGIN FORM ================= -->
        <div class="flex items-center justify-left md:absolute md:inset-0 px-4 sm:px-6 sm:ml-32 mt-5">
            <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl p-6 sm:p-8 md:p-12">

                <h2 class="text-2xl sm:text-3xl font-semibold text-gray-800">
                    Welcome back
                </h2>
                <p class="text-sm text-gray-400 mt-1">
                    Login to continue to your account.
                </p>

                {% if messages %}
                <div class="mt-4">
                    {% for message in messages %}
                    <div
                        class="p-3 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="mt-6 sm:mt-8">
                    {% csrf_token %}

                    <div class="space-y-4">
                        <div>
                            <label for="phone">Phone Number</label>
                            <input type="text" name="phone" id="phone" required
                                class="w-full bg-gray-100 px-4 py-3 rounded-full focus:ring-2 focus:ring-[#1F3D2B]"
                                placeholder="Enter your phone number">
                        </div>

                        <div>
                            <label for="password">Password</label>
                            <div class="relative">
                                <input type="password" name="password" id="password" required
                                    class="w-full bg-gray-100 px-4 py-3 rounded-full pr-12 focus:ring-2 focus:ring-[#1F3D2B]"
                                    placeholder="Enter your password">
                                <button type="button" onclick="togglePassword(this)"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5
                                            c4.478 0 8.268 2.943 9.542 7
                                            -1.274 4.057-5.064 7-9.542 7
                                            -4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full mt-6 bg-[#1F3D2B] text-white px-8 py-3 rounded-full hover:bg-[#173021] transition">
                        Login
                    </button>
                </form>

                <!-- Phone.Email OTP Integration -->
                <!-- <div class="mt-4 relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>

                <div class="mt-4">
                    <div id="pheIncludedContent"></div>
                    {% if not phone_email_client_id %}
                    <p class="text-xs text-red-600 mt-2">
                        Phone.Email is not configured. Set <code>PHONE_EMAIL_CLIENT_ID</code> in <code>.env</code>.
                    </p>
                    {% endif %}
                </div> -->

                <p class="text-sm text-gray-400 mt-6 text-center sm:text-left">
                    <a href="{% url 'public_items' %}" class="text-gray-500 hover:text-primary transition">
                        ← Back to Home
                    </a>
                    <span class="mx-2">·</span>
                    New user?
                    <a href="{% url 'signup' %}" class="text-green-700 font-medium hover:underline">
                        Create account
                    </a>
                </p>

            </div>
        </div>

    </section>

    <!-- Phone.Email Integration Script -->
    <script src="https://auth.phone.email/login_automated_v1_3.js"></script>
    <script>
        // {% if phone_email_client_id %}
        var reqJson = JSON.stringify({
            client_id: '{{ phone_email_client_id|escapejs }}',
            button_text: 'Sign in with Phone',
            email_icon_position: 'left',
            logout: 'disable',
            redirect_url: window.location.origin + "{% url 'phone_email_callback' %}"
        });
        if (typeof window.log_in_with_phone === 'function') {
            window.log_in_with_phone(reqJson);
        }
        // {% endif %}

        function togglePassword(btn) {
            const input = btn.previousElementSibling;
            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = eyeOff;
            } else {
                input.type = "password";
                btn.innerHTML = eyeOn;
            }
        }

        const eyeOn = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                   -1.274 4.057-5.064 7-9.542 7
                   -4.477 0-8.268-2.943-9.542-7z" />
        </svg>
    `;

        const eyeOff = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19
                   c-4.478 0-8.268-2.943-9.543-7
                   a9.956 9.956 0 012.223-3.592" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6.18 6.18A9.957 9.957 0 0112 5
                   c4.478 0 8.268 2.943 9.543 7
                   a9.97 9.97 0 01-4.043 5.412" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 00-3-3" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3l18 18" />
        </svg>
    `;
    </script>

</body>

</html>
