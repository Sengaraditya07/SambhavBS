<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP – Mein Tera Parivaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-2">Verify OTP</h2>
    <p class="text-center text-gray-600 mb-6">Enter the 6-digit OTP sent to your phone</p>

    {% if dev_otp %}
    <div class="mb-4 p-3 bg-yellow-100 border border-yellow-300 rounded text-center">
        <p class="text-sm text-yellow-800">🔧 <strong>Development Mode</strong></p>
        <p class="text-2xl font-bold text-yellow-900 tracking-widest mt-1">{{ dev_otp }}</p>
    </div>
    {% endif %}

    {% if messages %}
    <div class="mb-4">
        {% for message in messages %}
        <div class="p-3 rounded {% if message.tags == 'error' %}bg-red-100 text-red-700{% elif message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-blue-100 text-blue-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label for="otp" class="block text-sm font-medium text-gray-700 mb-1">OTP Code</label>
            <input type="text" name="otp" id="otp" required
                   maxlength="6" pattern="[0-9]{6}"
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-2xl tracking-widest"
                   placeholder="000000"
                   autocomplete="one-time-code">
        </div>

        <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">
            Verify & Login
        </button>
    </form>

    <div class="mt-4 text-center">
        <p class="text-sm text-gray-600">
            Didn't receive OTP?
            <a href="{% url 'resend_otp' %}" class="text-indigo-600 hover:underline">
                Resend OTP
            </a>
        </p>
        <p class="text-sm text-gray-600 mt-2">
            <a href="{% url 'login' %}" class="text-gray-500 hover:underline">
                ← Back to Login
            </a>
        </p>
    </div>
</div>

</body>
</html>
