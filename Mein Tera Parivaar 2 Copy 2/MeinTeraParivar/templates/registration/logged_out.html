{% extends 'base.html' %}

{% block title %}Logged Out - Mein Tera Parivaar{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">You have been logged out</h2>
        
        <p class="text-gray-600 mb-6">Thank you for contributing to the community.</p>
        
        <div class="flex flex-col space-y-3">
            <a 
                href="/accounts/login/" 
                class="bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition"
            >
                Login Again
            </a>
            <a 
                href="/items/" 
                class="bg-gray-200 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-300 transition"
            >
                View Available Items
            </a>
        </div>
    </div>
</div>
{% endblock %}
